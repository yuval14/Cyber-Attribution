<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The Future of Cyber Attribution</title>
  <desc id="desc">White background infographic about the future of cyber attribution.</desc>
  <defs>
    <style>
      text{font-family:Arial,Helvetica,sans-serif}
      .title{font-size:54px;font-weight:800;fill:#06214a;letter-spacing:1px}
      .subtitle{font-size:25px;font-weight:700;fill:#0b57b7}
      .head{font-size:24px;font-weight:800;fill:#06214a}
      .label{font-size:18px;font-weight:800;fill:#06214a}
      .body{font-size:15px;fill:#111827}
      .small{font-size:13px;fill:#111827}
      .author{font-size:24px;font-weight:800;font-style:italic;fill:#0b57b7}
      .blueBox{fill:#eef6ff;stroke:#0b57b7;stroke-width:1.6}
      .greenBox{fill:#f1fbf2;stroke:#2e7d32;stroke-width:1.6}
      .orangeBox{fill:#fff6e8;stroke:#ef8a00;stroke-width:1.6}
      .redBox{fill:#fff3f1;stroke:#e53935;stroke-width:1.6}
      .purpleBox{fill:#f7f0ff;stroke:#6b46c1;stroke-width:1.6}
      .tealBox{fill:#effdfa;stroke:#00897b;stroke-width:1.6}
      .panel{fill:#ffffff;stroke:#c7d7ee;stroke-width:1.6}
      .line{stroke:#d9e4f5;stroke-width:1.2}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="800" y="62" text-anchor="middle" class="title">THE FUTURE OF CYBER ATTRIBUTION</text>
  <text x="800" y="103" text-anchor="middle" class="subtitle">From certainty to confidence. From indicators to intelligence. From attribution to advantage.</text>

  <g transform="translate(40,132)">
    <rect width="295" height="92" rx="18" class="blueBox"/>
    <circle cx="45" cy="46" r="27" fill="none" stroke="#0b57b7" stroke-width="5"/>
    <path d="M32 47 Q45 23 58 47 Q45 69 32 47Z" fill="none" stroke="#0b57b7" stroke-width="4"/>
    <text x="85" y="32" class="label">AI ASSISTED</text>
    <text x="85" y="56" class="body">Faster correlation, pattern</text>
    <text x="85" y="76" class="body">discovery and triage.</text>
  </g>
  <g transform="translate(355,132)">
    <rect width="295" height="92" rx="18" class="purpleBox"/>
    <path d="M45 16 L70 30 L64 66 L45 78 L26 66 L20 30 Z" fill="none" stroke="#6b46c1" stroke-width="5"/>
    <text x="85" y="32" class="label">DECEPTION AWARE</text>
    <text x="85" y="56" class="body">Tests false flags, mimicry</text>
    <text x="85" y="76" class="body">and planted evidence.</text>
  </g>
  <g transform="translate(670,132)">
    <rect width="295" height="92" rx="18" class="tealBox"/>
    <circle cx="45" cy="46" r="29" fill="none" stroke="#00897b" stroke-width="5"/>
    <line x1="17" y1="46" x2="73" y2="46" stroke="#00897b" stroke-width="4"/>
    <line x1="45" y1="18" x2="45" y2="74" stroke="#00897b" stroke-width="4"/>
    <circle cx="45" cy="46" r="8" fill="#00897b"/>
    <text x="85" y="32" class="label">PROBABILISTIC</text>
    <text x="85" y="56" class="body">Confidence levels, not</text>
    <text x="85" y="76" class="body">absolute certainty.</text>
  </g>
  <g transform="translate(985,132)">
    <rect width="295" height="92" rx="18" class="orangeBox"/>
    <path d="M18 66 A34 34 0 1 1 72 66" fill="none" stroke="#ef8a00" stroke-width="5"/>
    <line x1="45" y1="52" x2="68" y2="26" stroke="#ef8a00" stroke-width="5"/>
    <circle cx="45" cy="52" r="6" fill="#ef8a00"/>
    <text x="85" y="32" class="label">FAST DECISIONS</text>
    <text x="85" y="56" class="body">Decision-grade outputs</text>
    <text x="85" y="76" class="body">under time pressure.</text>
  </g>
  <g transform="translate(1300,132)">
    <rect width="255" height="92" rx="18" class="greenBox"/>
    <path d="M25 45 C38 27 53 27 66 45 C53 63 38 63 25 45Z" fill="none" stroke="#2e7d32" stroke-width="5"/>
    <line x1="25" y1="45" x2="66" y2="45" stroke="#2e7d32" stroke-width="4"/>
    <text x="88" y="32" class="label">COLLABORATIVE</text>
    <text x="88" y="56" class="body">Coalition and public</text>
    <text x="88" y="76" class="body">private attribution.</text>
  </g>

  <g transform="translate(40,250)">
    <rect width="345" height="425" rx="18" class="redBox"/>
    <rect x="38" y="0" width="270" height="42" rx="10" fill="#e53935"/>
    <text x="173" y="28" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">CHALLENGES AHEAD</text>
    <g transform="translate(25,75)">
      <circle cx="26" cy="12" r="21" fill="#e53935" opacity="0.15"/>
      <path d="M14 2 Q26 -9 38 2 L34 27 Q26 37 18 27Z" fill="none" stroke="#e53935" stroke-width="3"/>
      <text x="70" y="0" class="label">False Flags at Scale</text>
      <text x="70" y="24" class="body">Tools, TTPs and artifacts can</text>
      <text x="70" y="44" class="body">be imitated by AI operators.</text>
    </g>
    <line x1="24" y1="152" x2="321" y2="152" class="line"/>
    <g transform="translate(25,187)">
      <rect x="8" y="-12" width="36" height="36" rx="7" fill="none" stroke="#ef8a00" stroke-width="4"/>
      <circle cx="20" cy="6" r="3" fill="#ef8a00"/><circle cx="34" cy="6" r="3" fill="#ef8a00"/>
      <text x="70" y="0" class="label">AI Powered Operations</text>
      <text x="70" y="24" class="body">Lower cost, faster execution,</text>
      <text x="70" y="44" class="body">and stealthier campaigns.</text>
    </g>
    <line x1="24" y1="264" x2="321" y2="264" class="line"/>
    <g transform="translate(25,300)">
      <circle cx="26" cy="10" r="22" fill="none" stroke="#6b46c1" stroke-width="4"/>
      <line x1="26" y1="-16" x2="26" y2="36" stroke="#6b46c1" stroke-width="3"/>
      <line x1="0" y1="10" x2="52" y2="10" stroke="#6b46c1" stroke-width="3"/>
      <text x="70" y="0" class="label">CTI Noise and Poisoning</text>
      <text x="70" y="24" class="body">Misleading reports and planted</text>
      <text x="70" y="44" class="body">indicators can distort judgment.</text>
    </g>
  </g>

  <g transform="translate(410,250)">
    <rect width="670" height="425" rx="18" class="panel"/>
    <text x="335" y="35" text-anchor="middle" class="head">FUTURE ATTRIBUTION MODEL</text>
    <circle cx="335" cy="230" r="95" fill="#ffffff" stroke="#0b57b7" stroke-width="4"/>
    <circle cx="335" cy="230" r="63" fill="#eef6ff" stroke="#8bb6ee" stroke-width="1.5"/>
    <text x="335" y="215" text-anchor="middle" font-size="24" font-weight="800" fill="#06214a">AI AUGMENTED</text>
    <text x="335" y="245" text-anchor="middle" font-size="24" font-weight="800" fill="#06214a">ANALYST</text>
    <text x="335" y="275" text-anchor="middle" class="body">human judgment and accountability</text>
    <rect x="165" y="65" width="340" height="76" rx="14" class="blueBox"/>
    <text x="187" y="93" class="label">1. Evidence Collection</text>
    <text x="187" y="117" class="body">Telemetry, malware, OSINT, HUMINT, SIGINT.</text>
    <rect x="445" y="160" width="195" height="84" rx="14" class="tealBox"/>
    <text x="463" y="188" class="label">2. Correlation</text>
    <text x="463" y="212" class="body">Normalize, enrich,</text>
    <text x="463" y="232" class="body">map relationships.</text>
    <rect x="445" y="280" width="195" height="84" rx="14" class="greenBox"/>
    <text x="463" y="308" class="label">3. Hypotheses</text>
    <text x="463" y="332" class="body">Generate actor and</text>
    <text x="463" y="352" class="body">campaign options.</text>
    <rect x="165" y="345" width="340" height="62" rx="14" class="orangeBox"/>
    <text x="187" y="371" class="label">4. Evaluation and Scoring</text>
    <text x="187" y="393" class="body">Evidence quality, consistency and confidence.</text>
    <rect x="30" y="280" width="190" height="84" rx="14" class="redBox"/>
    <text x="48" y="308" class="label">5. Deception</text>
    <text x="48" y="332" class="body">False flags, mimicry,</text>
    <text x="48" y="352" class="body">poisoning analysis.</text>
    <rect x="30" y="160" width="190" height="84" rx="14" class="purpleBox"/>
    <text x="48" y="188" class="label">6. Reporting</text>
    <text x="48" y="212" class="body">Tiered judgment and</text>
    <text x="48" y="232" class="body">evidentiary rationale.</text>
    <path d="M335 145 C405 145 455 170 482 215" fill="none" stroke="#0b57b7" stroke-width="4"/>
    <path d="M484 245 C465 310 415 350 335 350" fill="none" stroke="#2e7d32" stroke-width="4"/>
    <path d="M335 350 C250 350 198 315 184 250" fill="none" stroke="#ef8a00" stroke-width="4"/>
    <path d="M184 215 C210 170 260 145 335 145" fill="none" stroke="#6b46c1" stroke-width="4"/>
    <rect x="28" y="382" width="614" height="30" rx="8" fill="#f8fbff" stroke="#0b57b7"/>
    <text x="335" y="402" text-anchor="middle" class="body"><tspan font-weight="800" fill="#0b57b7">OUTPUT:</tspan> Actor cluster • Campaign • Strategic sponsor • Legal or policy responsibility</text>
  </g>

  <g transform="translate(1110,250)">
    <rect width="450" height="425" rx="18" class="panel"/>
    <text x="225" y="35" text-anchor="middle" class="head">MULTI LAYER EVIDENCE</text>
    <rect x="22" y="62" width="406" height="45" rx="10" class="blueBox"/>
    <text x="42" y="91" class="label">Technical</text><text x="172" y="82" class="small">Malware, infrastructure, logs, artifacts,</text><text x="172" y="98" class="small">exploits and code similarity.</text>
    <rect x="22" y="117" width="406" height="45" rx="10" class="tealBox"/>
    <text x="42" y="146" class="label">Behavioral</text><text x="172" y="137" class="small">TTPs, tempo, sequencing, tooling habits</text><text x="172" y="153" class="small">and operational security mistakes.</text>
    <rect x="22" y="172" width="406" height="45" rx="10" class="greenBox"/>
    <text x="42" y="201" class="label">Intelligence</text><text x="172" y="192" class="small">Partner reporting, classified enrichment,</text><text x="172" y="208" class="small">source reliability and confidence.</text>
    <rect x="22" y="227" width="406" height="45" rx="10" class="orangeBox"/>
    <text x="42" y="256" class="label">Strategic</text><text x="172" y="247" class="small">Victimology, timing, geopolitical context</text><text x="172" y="263" class="small">and assessed benefit.</text>
    <rect x="22" y="282" width="406" height="45" rx="10" class="redBox"/>
    <text x="42" y="311" class="label">Legal</text><text x="172" y="302" class="small">Control, direction, due diligence and</text><text x="172" y="318" class="small">evidentiary standards.</text>
    <rect x="22" y="337" width="406" height="45" rx="10" class="purpleBox"/>
    <text x="42" y="366" class="label">AI Specific</text><text x="172" y="357" class="small">Prompts, model calls, tool calls, agent</text><text x="172" y="373" class="small">traces and model lineage.</text>
  </g>

  <g transform="translate(40,710)">
    <text x="760" y="0" text-anchor="middle" class="head">THE EVOLUTION OF ATTRIBUTION</text>
    <rect x="0" y="25" width="235" height="110" rx="16" class="blueBox"/>
    <text x="24" y="56" class="label">PAST</text><text x="24" y="80" class="body">Manual analysis, limited sources,</text><text x="24" y="100" class="body">high uncertainty, slow timelines.</text>
    <polygon points="252,80 280,65 280,95" fill="#06214a"/>
    <rect x="300" y="25" width="235" height="110" rx="16" class="purpleBox"/>
    <text x="324" y="56" class="label">PRESENT</text><text x="324" y="80" class="body">Threat intel sharing, more data,</text><text x="324" y="100" class="body">partial automation.</text>
    <polygon points="552,80 580,65 580,95" fill="#06214a"/>
    <rect x="600" y="25" width="260" height="110" rx="16" class="tealBox"/>
    <text x="624" y="56" class="label">NEAR FUTURE</text><text x="624" y="80" class="body">AI assisted analysis, evidence graphs,</text><text x="624" y="100" class="body">probabilistic confidence.</text>
    <polygon points="878,80 906,65 906,95" fill="#06214a"/>
    <rect x="925" y="25" width="250" height="110" rx="16" class="greenBox"/>
    <text x="949" y="56" class="label">FUTURE</text><text x="949" y="80" class="body">Real time attribution and</text><text x="949" y="100" class="body">deception resilient models.</text>
    <polygon points="1192,80 1220,65 1220,95" fill="#06214a"/>
    <rect x="1240" y="25" width="280" height="110" rx="16" class="orangeBox"/>
    <text x="1264" y="56" class="label">THE GOAL</text><text x="1264" y="80" class="body">Better decisions, faster. Clear about</text><text x="1264" y="100" class="body">what we know, do not know, and why.</text>
  </g>
  <line x1="210" y1="852" x2="710" y2="852" stroke="#0b57b7" stroke-width="2"/>
  <text x="800" y="860" text-anchor="middle" class="author">Autor: Yuval Sinay</text>
  <line x1="890" y1="852" x2="1390" y2="852" stroke="#0b57b7" stroke-width="2"/>
</svg>
