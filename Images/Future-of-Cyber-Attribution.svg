<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">The Future of Cyber Attribution</title>
  <desc id="desc">White background infographic about AI assisted, deception aware, probabilistic cyber attribution.</desc>
  <defs>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-size:58px;font-weight:800;fill:#071b3a;letter-spacing:2px}
      .subtitle{font-family:Arial,Helvetica,sans-serif;font-size:26px;font-weight:700;fill:#0b57b7}
      .h{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:800;fill:#071b3a}
      .hh{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:800;fill:#0b57b7}
      .txt{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#111827}
      .small{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#111827}
      .label{font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:800}
      .author{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-style:italic;font-weight:800;fill:#0048b5}
      .box{fill:#ffffff;stroke:#0b57b7;stroke-width:1.5;rx:14}
      .soft{fill:#f7fbff;stroke:#97b8e8;stroke-width:1.2;rx:12}
      .red{fill:#fff6f4;stroke:#e74c3c;stroke-width:1.5;rx:14}
      .green{fill:#f6fff4;stroke:#2e7d32;stroke-width:1.5;rx:14}
      .orange{fill:#fff8ec;stroke:#ef8a00;stroke-width:1.5;rx:14}
      .purple{fill:#fbf7ff;stroke:#6b46c1;stroke-width:1.5;rx:14}
      .teal{fill:#f3fffd;stroke:#00897b;stroke-width:1.5;rx:14}
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#ffffff"/>

  <text x="800" y="64" text-anchor="middle" class="title">THE FUTURE OF CYBER ATTRIBUTION</text>
  <text x="800" y="103" text-anchor="middle" class="subtitle">From Certainty to Confidence. From Indicators to Intelligence. From Attribution to Advantage.</text>

  <g transform="translate(45,130)">
    <text x="65" y="0" class="hh">AI ASSISTED</text>
    <circle cx="22" cy="-13" r="20" fill="#eaf3ff" stroke="#0b57b7" stroke-width="3"/>
    <text x="22" y="-7" text-anchor="middle" font-size="24">AI</text>
    <text x="65" y="24" class="txt">Accelerates correlation, pattern</text>
    <text x="65" y="44" class="txt">discovery and hypotheses.</text>
  </g>
  <g transform="translate(370,130)">
    <text x="65" y="0" class="hh" fill="#6b46c1">DECEPTION AWARE</text>
    <path d="M22 -37 L48 -25 L43 22 L22 43 L1 22 L-4 -25 Z" fill="#f1e8ff" stroke="#6b46c1" stroke-width="4"/>
    <text x="65" y="24" class="txt">Adversaries can imitate, plant</text>
    <text x="65" y="44" class="txt">and manipulate evidence.</text>
  </g>
  <g transform="translate(710,130)">
    <text x="65" y="0" class="hh" fill="#00897b">PROBABILISTIC</text>
    <circle cx="22" cy="-13" r="31" fill="none" stroke="#00897b" stroke-width="4"/>
    <line x1="-15" y1="-13" x2="59" y2="-13" stroke="#00897b" stroke-width="3"/>
    <line x1="22" y1="-50" x2="22" y2="24" stroke="#00897b" stroke-width="3"/>
    <circle cx="22" cy="-13" r="8" fill="#00897b"/>
    <text x="65" y="24" class="txt">Confidence levels, not</text>
    <text x="65" y="44" class="txt">absolute certainty.</text>
  </g>
  <g transform="translate(1035,130)">
    <text x="65" y="0" class="hh" fill="#ef8a00">FASTER DECISIONS</text>
    <path d="M-4 10 A36 36 0 1 1 48 10" fill="none" stroke="#ef8a00" stroke-width="4"/>
    <line x1="22" y1="-15" x2="45" y2="-35" stroke="#ef8a00" stroke-width="4"/>
    <circle cx="22" cy="-15" r="5" fill="#ef8a00"/>
    <text x="65" y="24" class="txt">Deliver timely, actionable</text>
    <text x="65" y="44" class="txt">judgments under pressure.</text>
  </g>
  <g transform="translate(1320,130)">
    <text x="65" y="0" class="hh" fill="#4a7c1b">COLLABORATIVE</text>
    <text x="8" y="2" font-size="46" fill="#4a7c1b">🤝</text>
    <text x="65" y="24" class="txt">Coalition and public-private</text>
    <text x="65" y="44" class="txt">attribution increase legitimacy.</text>
  </g>

  <g transform="translate(30,210)">
    <rect width="330" height="535" class="red"/>
    <rect x="45" y="0" width="230" height="36" fill="#e53935" rx="8"/>
    <text x="160" y="25" text-anchor="middle" font-family="Arial" font-size="18" font-weight="800" fill="#fff">THE CHALLENGES AHEAD</text>

    <text x="24" y="90" font-size="44">🎭</text><text x="105" y="72" class="label" fill="#111">Sophisticated False Flags</text>
    <text x="105" y="95" class="txt">Tools, TTPs and behavior can</text><text x="105" y="115" class="txt">be imitated at scale using AI.</text>
    <line x1="20" y1="140" x2="310" y2="140" stroke="#f0b4aa"/>

    <text x="25" y="190" font-size="44">🤖</text><text x="105" y="172" class="label" fill="#111">AI Powered Operations</text>
    <text x="105" y="195" class="txt">AI lowers the barrier to execute</text><text x="105" y="215" class="txt">complex and stealthy operations.</text>
    <line x1="20" y1="240" x2="310" y2="240" stroke="#f0b4aa"/>

    <text x="25" y="290" font-size="44">☊</text><text x="105" y="272" class="label" fill="#111">CTI Noise and Poisoning</text>
    <text x="105" y="295" class="txt">Information operations and CTI</text><text x="105" y="315" class="txt">poisoning can mislead analysis.</text>
    <line x1="20" y1="340" x2="310" y2="340" stroke="#f0b4aa"/>

    <text x="25" y="390" font-size="44">🔒</text><text x="105" y="372" class="label" fill="#0b57b7">Limited Visibility</text>
    <text x="105" y="395" class="txt">Encryption, privacy and evasive</text><text x="105" y="415" class="txt">infrastructure reduce evidence.</text>
    <line x1="20" y1="440" x2="310" y2="440" stroke="#f0b4aa"/>

    <text x="25" y="490" font-size="44">⚖</text><text x="105" y="472" class="label" fill="#2e7d32">Legal and Political Limits</text>
    <text x="105" y="495" class="txt">Disclosure limits and different</text><text x="105" y="515" class="txt">thresholds complicate attribution.</text>
  </g>

  <g transform="translate(390,210)">
    <rect width="700" height="560" class="box"/>
    <text x="350" y="28" text-anchor="middle" class="h">THE FUTURE ATTRIBUTION MODEL</text>

    <circle cx="350" cy="275" r="105" fill="#ffffff" stroke="#0b57b7" stroke-width="3"/>
    <circle cx="350" cy="275" r="72" fill="#f7fbff" stroke="#97b8e8"/>
    <text x="350" y="258" text-anchor="middle" font-family="Arial" font-size="24" font-weight="800" fill="#111827">AI AUGMENTED</text>
    <text x="350" y="288" text-anchor="middle" font-family="Arial" font-size="24" font-weight="800" fill="#111827">ANALYST</text>
    <text x="350" y="315" text-anchor="middle" class="txt">Human judgment, context</text>
    <text x="350" y="335" text-anchor="middle" class="txt">and accountability</text>

    <rect x="180" y="55" width="340" height="92" class="soft"/>
    <text x="206" y="84" class="label" fill="#0b57b7">1. EVIDENCE COLLECTION</text>
    <text x="206" y="110" class="txt">Telemetry, malware, infrastructure, logs,</text>
    <text x="206" y="130" class="txt">OSINT, HUMINT, SIGINT and partners.</text>

    <rect x="520" y="150" width="160" height="130" class="teal"/>
    <text x="545" y="182" class="label" fill="#00897b">2. NORMALIZATION</text>
    <text x="545" y="204" class="label" fill="#00897b">AND CORRELATION</text>
    <text x="545" y="232" class="txt">Enrichment, deduplication</text>
    <text x="545" y="252" class="txt">and relationship mapping.</text>

    <rect x="520" y="320" width="160" height="130" class="green"/>
    <text x="545" y="352" class="label" fill="#2e7d32">3. HYPOTHESIS</text>
    <text x="545" y="374" class="label" fill="#2e7d32">GENERATION</text>
    <text x="545" y="402" class="txt">Multiple actor, campaign</text>
    <text x="545" y="422" class="txt">and sponsor hypotheses.</text>

    <rect x="180" y="455" width="340" height="85" class="orange"/>
    <text x="206" y="485" class="label" fill="#ef8a00">4. EVALUATION AND SCORING</text>
    <text x="206" y="512" class="txt">Assess quality, consistency, alternatives</text>
    <text x="206" y="532" class="txt">and confidence levels.</text>

    <rect x="20" y="320" width="160" height="130" class="orange"/>
    <text x="45" y="352" class="label" fill="#e65100">5. DECEPTION</text>
    <text x="45" y="374" class="label" fill="#e65100">ANALYSIS</text>
    <text x="45" y="402" class="txt">Evaluate false flags,</text>
    <text x="45" y="422" class="txt">imitation and poisoning.</text>

    <rect x="20" y="150" width="160" height="130" class="purple"/>
    <text x="45" y="182" class="label" fill="#6b46c1">6. JUDGMENT</text>
    <text x="45" y="204" class="label" fill="#6b46c1">AND REPORTING</text>
    <text x="45" y="232" class="txt">Tiered attribution with</text>
    <text x="45" y="252" class="txt">evidentiary rationale.</text>

    <path d="M350 154 A120 120 0 0 1 470 274" fill="none" stroke="#0b57b7" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M470 276 A120 120 0 0 1 350 396" fill="none" stroke="#2e7d32" stroke-width="4"/>
    <path d="M350 396 A120 120 0 0 1 230 276" fill="none" stroke="#ef8a00" stroke-width="4"/>
    <path d="M230 274 A120 120 0 0 1 350 154" fill="none" stroke="#6b46c1" stroke-width="4"/>

    <rect x="25" y="515" width="650" height="34" fill="#f7fbff" stroke="#0b57b7" rx="8"/>
    <text x="350" y="538" text-anchor="middle" class="txt"><tspan font-weight="800" fill="#0b57b7">OUTPUT:</tspan> Actor Cluster • Campaign • Strategic Sponsor • Legal/Policy Responsibility</text>
  </g>

  <g transform="translate(1115,210)">
    <rect width="450" height="470" class="box"/>
    <text x="225" y="28" text-anchor="middle" class="h" fill="#0b57b7">MULTI LAYER EVIDENCE FRAMEWORK</text>
    <g transform="translate(18,58)">
      <rect width="414" height="50" class="soft"/><text x="72" y="31" class="label" fill="#0b57b7">TECHNICAL</text><text x="185" y="21" class="small">Malware, exploits, infrastructure,</text><text x="185" y="38" class="small">logs, artifacts, code similarity</text>
      <rect y="60" width="414" height="50" class="teal"/><text x="72" y="91" class="label" fill="#00897b">BEHAVIORAL</text><text x="185" y="81" class="small">TTPs, sequencing, tempo, tooling</text><text x="185" y="98" class="small">habits and opsec mistakes</text>
      <rect y="120" width="414" height="50" class="green"/><text x="72" y="151" class="label" fill="#2e7d32">INTELLIGENCE</text><text x="185" y="141" class="small">SIGINT, HUMINT, partner reporting</text><text x="185" y="158" class="small">and classified enrichment</text>
      <rect y="180" width="414" height="50" class="orange"/><text x="72" y="211" class="label" fill="#ef8a00">STRATEGIC</text><text x="185" y="201" class="small">Victimology, timing, geopolitical</text><text x="185" y="218" class="small">context and benefit assessment</text>
      <rect y="240" width="414" height="50" class="red"/><text x="72" y="271" class="label" fill="#e53935">LEGAL</text><text x="185" y="261" class="small">State control, direction, due</text><text x="185" y="278" class="small">diligence and evidentiary standard</text>
      <rect y="300" width="414" height="50" class="purple"/><text x="72" y="331" class="label" fill="#6b46c1">AI SPECIFIC</text><text x="185" y="321" class="small">Prompts, model calls, tool calls,</text><text x="185" y="338" class="small">agent traces and model lineage</text>
    </g>
  </g>

  <g transform="translate(1115,705)">
    <rect width="450" height="220" class="box"/>
    <text x="225" y="30" text-anchor="middle" class="h" fill="#0b57b7">ATTRIBUTION TIMELINES</text>
    <text x="25" y="70" class="label" fill="#0b57b7">HOURS</text><text x="135" y="70" class="txt">Technical cluster and immediate defense</text>
    <text x="25" y="110" class="label" fill="#0b57b7">DAYS</text><text x="135" y="110" class="txt">Campaign hypothesis and confidence</text>
    <text x="25" y="150" class="label" fill="#0b57b7">WEEKS</text><text x="135" y="150" class="txt">Strategic attribution and response options</text>
    <text x="25" y="190" class="label" fill="#0b57b7">MONTHS</text><text x="135" y="190" class="txt">Legal package, sanctions or prosecution</text>
  </g>

  <g transform="translate(30,795)">
    <text x="750" y="0" text-anchor="middle" class="h">THE EVOLUTION OF ATTRIBUTION</text>
    <rect x="0" y="25" width="210" height="145" class="soft"/><text x="25" y="58" class="label" fill="#0b57b7">PAST 2000s</text><text x="25" y="90" class="small">• Manual analysis</text><text x="25" y="112" class="small">• Limited data sources</text><text x="25" y="134" class="small">• Slow timelines</text>
    <text x="225" y="108" font-size="30">→</text>
    <rect x="250" y="25" width="210" height="145" class="purple"/><text x="275" y="58" class="label" fill="#6b46c1">PRESENT 2020s</text><text x="275" y="90" class="small">• More tools and data</text><text x="275" y="112" class="small">• Threat intel sharing</text><text x="275" y="134" class="small">• Partial automation</text>
    <text x="475" y="108" font-size="30">→</text>
    <rect x="500" y="25" width="240" height="145" class="teal"/><text x="525" y="58" class="label" fill="#00897b">NEAR FUTURE 2025–2030</text><text x="525" y="90" class="small">• AI assisted analysis</text><text x="525" y="112" class="small">• Evidence graphs</text><text x="525" y="134" class="small">• Probabilistic confidence</text>
    <text x="755" y="108" font-size="30">→</text>
    <rect x="785" y="25" width="230" height="145" class="green"/><text x="810" y="58" class="label" fill="#2e7d32">FUTURE 2030+</text><text x="810" y="90" class="small">• Real time attribution</text><text x="810" y="112" class="small">• Deception resilient models</text><text x="810" y="134" class="small">• Decision grade outputs</text>
    <text x="1030" y="108" font-size="30">→</text>
    <rect x="1060" y="25" width="250" height="145" class="orange"/><text x="1085" y="58" class="label" fill="#ef8a00">THE GOAL</text><text x="1085" y="90" class="small">Better decisions, faster.</text><text x="1085" y="112" class="small">Clear about what we know,</text><text x="1085" y="134" class="small">what we do not know and why.</text>
  </g>

  <line x1="35" y1="962" x2="650" y2="962" stroke="#0b57b7" stroke-width="2"/>
  <text x="800" y="970" text-anchor="middle" class="author">Autor: Yuval Sinay</text>
  <line x1="950" y1="962" x2="1565" y2="962" stroke="#0b57b7" stroke-width="2"/>
</svg>
